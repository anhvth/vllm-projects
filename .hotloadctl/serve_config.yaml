proxy_location: EveryNode
http_options:
  host: 0.0.0.0
  port: 8000
applications:
- name: vllm-hotload-public
  route_prefix: /
  import_path: vllm_hotload.ray_serve_app:build_public_proxy_app
  args:
    replicas:
    - node: 100.96.5.35
      base_url: http://127.0.0.1:8000/_hotloadctl/replicas/1-100-96-5-35
      v1_url: http://127.0.0.1:8000/_hotloadctl/replicas/1-100-96-5-35/v1
      managed_url: http://127.0.0.1:8000/_hotloadctl/replicas/1-100-96-5-35/managed
    - node: 100.96.34.48
      base_url: http://127.0.0.1:8000/_hotloadctl/replicas/2-100-96-34-48
      v1_url: http://127.0.0.1:8000/_hotloadctl/replicas/2-100-96-34-48/v1
      managed_url: http://127.0.0.1:8000/_hotloadctl/replicas/2-100-96-34-48/managed
    - node: 100.96.31.61
      base_url: http://127.0.0.1:8000/_hotloadctl/replicas/3-100-96-31-61
      v1_url: http://127.0.0.1:8000/_hotloadctl/replicas/3-100-96-31-61/v1
      managed_url: http://127.0.0.1:8000/_hotloadctl/replicas/3-100-96-31-61/managed
  deployments:
  - name: HotloadPublicProxy
    num_replicas: 1
    ray_actor_options:
      num_cpus: 0.1
      runtime_env: &id001
        env_vars:
          PYTHONPATH: /home/anhvth8/vllm_projects/src:/home/anhvth8/vllm_projects/vllm_patch:src
          VLLM_SERVER_DEV_MODE: '1'
          VLLM_ALLOW_INSECURE_SERIALIZATION: '1'
- name: vllm-hotload-replica-1-100-96-5-35
  route_prefix: /_hotloadctl/replicas/1-100-96-5-35
  import_path: vllm_hotload.ray_serve_app:build_vllm_replica_app
  args:
    model_path: /home/anhvth8/ckpt/hf_models/Qwen/Qwen3-32B
    served_model_name: qwen3-32b
    gpus_per_replica: 8
    dtype: bfloat16
    gpu_memory_utilization: 0.4
    max_model_len: 4096
    route_prefix: /_hotloadctl/replicas/1-100-96-5-35
    trust_remote_code: true
    fast_loading_ram: true
    ram_stage_num_workers: 8
    ram_stage_copy_delay: 0.0
    ram_stage_small_file_threshold: 10000000
  deployments:
  - name: ManagedVLLMReplica
    num_replicas: 1
    max_replicas_per_node: 1
    ray_actor_options:
      num_gpus: 8
      resources:
        node:100.96.5.35: 0.001
      runtime_env: *id001
- name: vllm-hotload-replica-2-100-96-34-48
